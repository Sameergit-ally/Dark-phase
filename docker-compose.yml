version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./darkguard-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./darkguard-backend/.env
    depends_on:
      - redis
    volumes:
      - ./darkguard-backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ./darkguard-backend
      dockerfile: Dockerfile
    env_file:
      - ./darkguard-backend/.env
    depends_on:
      - redis
    volumes:
      - ./darkguard-backend:/app
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  # Celery Beat (Scheduler)
  beat:
    build:
      context: ./darkguard-backend
      dockerfile: Dockerfile
    env_file:
      - ./darkguard-backend/.env
    depends_on:
      - redis
    volumes:
      - ./darkguard-backend:/app
    command: celery -A tasks.celery_app beat --loglevel=info
    restart: unless-stopped

  # Redis (Cache + Message Broker)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
